<div class="register-container">
  <div class="register-card">

    <h2>Registrarse</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="firstName">Nombre:</label>
        <input id="firstName" type="text" placeholder="Juan" formControlName="firstName" />
        <span class="error-msg"
          *ngIf="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched">
          Campo requerido.
        </span>
      </div>

      <div class="form-group">
        <label for="lastName">Apellido:</label>
        <input id="lastName" type="text" placeholder="Pérez" formControlName="lastName" />
        <span class="error-msg"
          *ngIf="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched">
          Campo requerido.
        </span>
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input id="email" type="email" placeholder="juan@correo.com" formControlName="email" />
        <span class="error-msg"
          *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Ingresa un correo válido.
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña:</label>
        <input id="password" type="password" placeholder="Mínimo 8 caracteres" formControlName="password" />
        <span class="error-msg"
          *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Mínimo 8 caracteres.
        </span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar contraseña:</label>
        <input id="confirmPassword" type="password" placeholder="Repite tu contraseña" formControlName="confirmPassword" />
        <span class="error-msg"
          *ngIf="registerForm.errors?.['passwordsMismatch'] && registerForm.get('confirmPassword')?.touched">
          Las contraseñas no coinciden.
        </span>
      </div>

      <div class="terms-group">
        <input type="checkbox" id="terms" formControlName="terms" />
        <label for="terms">Acepto los términos y condiciones</label>
      </div>

      <button type="submit" class="btn-register" [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? 'Creando cuenta…' : 'Registrarse' }}
      </button>

    </form>

    <p class="login-link">
      ¿Ya tienes cuenta? <a routerLink="/login">← Volver al login</a>
    </p>

  </div>
</div>
